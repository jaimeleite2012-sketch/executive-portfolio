<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DashCV Admin</title><style>:root{--bg:#07101d;--p:#0d1828;--line:#22324a;--t:#eef5ff;--m:#91a3ba;--b:#3478ff;--v:#7b48ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Inter,system-ui,Arial}.wrap{max-width:960px;margin:auto;padding:20px}.banner{background:#2a1d60;border:1px solid #6b50ce;padding:13px;border-radius:13px}.card{background:var(--p);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{font-size:.8rem;color:#b6c3d5}input,textarea{width:100%;margin-top:5px;padding:10px;border-radius:9px;border:1px solid #2a3850;background:#09111c;color:#fff}textarea{min-height:100px}.btn{border:1px solid #2a3850;background:#111d30;color:#fff;padding:10px 13px;border-radius:10px;font-weight:700}.primary{border:0;background:linear-gradient(90deg,var(--v),var(--b))}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.item{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0}@media(max-width:650px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><div class="wrap"><div class="banner"><b>Modo administrador — protótipo local</b><div>As alterações ficam salvas somente neste navegador. Login e banco em nuvem serão adicionados na próxima fase.</div></div><div class="row"><a class="btn primary" href="index.html" target="_blank" style="text-decoration:none">Visualizar versão pública</a><button class="btn" onclick="resetData()">Restaurar demonstração</button></div><section class="card"><h2>Perfil</h2><div class="grid"><label>Nome<input id="name"></label><label>Título<input id="title"></label><label class="full">Resumo<textarea id="summary"></textarea></label><label>LinkedIn<input id="linkedin"></label><label>E-mail<input id="email"></label><label>WhatsApp<input id="whatsapp"></label></div><button class="btn primary" onclick="saveProfile()">Salvar perfil</button></section><section class="card"><h2>Experiências</h2><div id="experiences"></div><button class="btn primary" onclick="addExperience()">+ Adicionar experiência</button></section><section class="card"><h2>Projetos</h2><div id="projects"></div><button class="btn primary" onclick="addProject()">+ Adicionar projeto</button></section></div><script>const KEY='dashcv-admin-v11';const defaultData={profile:{name:'Jaime Leite',title:'Gerente Industrial | Qualidade | Produção | Desenvolvimento de Produtos',summary:'Executivo industrial com mais de 20 anos de experiência em gestão da qualidade, produção, desenvolvimento de produtos, melhoria contínua e liderança.',linkedin:'https://www.linkedin.com/in/jaime-l-2564648a',email:'',whatsapp:''},experiences:[{role:'Gerente de Controle, Produção e Sistema da Qualidade',company:'Bermas | Grupo Rino Mastrotto',period:'abr/2013 – atual',summary:'Gestão integrada de Qualidade, Produção, Desenvolvimento de Produtos, Assistência Técnica e Garantia da Qualidade.'},{role:'Engenharia da Qualidade e Controle',company:'Eagle Ottawa do Brasil',period:'mai/2006 – nov/2008',summary:'Qualidade de couro automotivo premium, Core Tools, 8D, PPM, auditorias e fornecedores.'}],projects:[{title:'Desenvolvimento automotivo',summary:'Projetos para Renault, Stellantis, GM, Ford e Volkswagen.'},{title:'Transformação digital',summary:'Dashboards, PWA, automação e IA aplicada à indústria.'}]};let db=JSON.parse(localStorage.getItem(KEY)||'null')||defaultData;function save(){localStorage.setItem(KEY,JSON.stringify(db));render()}function render(){name.value=db.profile.name;title.value=db.profile.title;summary.value=db.profile.summary;linkedin.value=db.profile.linkedin;email.value=db.profile.email;whatsapp.value=db.profile.whatsapp;experiences.innerHTML=db.experiences.map((e,i)=>`<div class="item"><div class="grid"><label>Cargo<input value="${e.role}" onchange="db.experiences[${i}].role=this.value"></label><label>Empresa<input value="${e.company}" onchange="db.experiences[${i}].company=this.value"></label><label>Período<input value="${e.period}" onchange="db.experiences[${i}].period=this.value"></label><label class="full">Resumo<textarea onchange="db.experiences[${i}].summary=this.value">${e.summary}</textarea></label></div><div class="row"><button class="btn primary" onclick="save()">Salvar</button><button class="btn" onclick="db.experiences.splice(${i},1);save()">Excluir</button></div></div>`).join('');projects.innerHTML=db.projects.map((p,i)=>`<div class="item"><label>Título<input value="${p.title}" onchange="db.projects[${i}].title=this.value"></label><label>Resumo<textarea onchange="db.projects[${i}].summary=this.value">${p.summary}</textarea></label><div class="row"><button class="btn primary" onclick="save()">Salvar</button><button class="btn" onclick="db.projects.splice(${i},1);save()">Excluir</button></div></div>`).join('')}function saveProfile(){db.profile={name:name.value,title:title.value,summary:summary.value,linkedin:linkedin.value,email:email.value,whatsapp:whatsapp.value};save();alert('Dados salvos neste navegador.')}function addExperience(){db.experiences.push({role:'Novo cargo',company:'Nova empresa',period:'',summary:''});save()}function addProject(){db.projects.push({title:'Novo projeto',summary:''});save()}function resetData(){if(confirm('Restaurar dados de demonstração?')){db=defaultData;save()}}render();</script></body></html>
